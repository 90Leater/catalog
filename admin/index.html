<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>GO.Leather Admin</title>

<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<aside class="sidebar">

    <div class="logo">
        GO.Leather
    </div>

    <ul>

        <li class="active">
            Dashboard
        </li>

        <li>
            Produk
        </li>

        <li>
            Kategori
        </li>

        <li>
            Pengunjung
        </li>

        <li>
            Logout
        </li>

    </ul>

</aside>

<main>

<header>

<h2>
Dashboard
</h2>

</header>

<section class="cards">

<div class="card">

<h3>Total Produk</h3>

<span id="totalProducts">

0

</span>

</div>

<div class="card">

<h3>Total View</h3>

<span id="totalViews">

0

</span>

</div>

<div class="card">

<h3>Produk Terpopuler</h3>

<span id="topProduct">

-

</span>

</div>

</section>

<section class="toolbar">

<button id="addProduct">

+ Tambah Produk

</button>

<button id="importJson">
Import product.json
</button>

<button
    class="deleteBtn"
    data-id="${product.id}">
    Hapus
</button>
    
<div id="importStatus"></div>

<progress
    id="importProgress"
    value="0"
    max="100">
</progress>

<div id="importStatus"></div>

<input
type="text"
id="searchProduct"
placeholder="Cari produk...">

</section>

    <table>

    <thead>

    <tr>

    <th>ID</th>

    <th>Nama</th>

    <th>Kategori</th>

    <th>Status</th>

    <th>Aksi</th>

    </tr>

    </thead>

    <tbody id="productTable">

    <tr>

    <td colspan="5">
        Memuat produk...
    </td>

    </tr>

    </tbody>

    </table>

</main>

<script type="module" src="js/admin.js"></script>

<div id="productModal" class="modal hidden">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="modalTitle">
                Tambah Produk
            </h2>

            <button id="closeModal">
                ✕
            </button>

        </div>

        <div class="modal-body">

<div class="form-group">

<label for="productName">
Nama Produk
</label>

<input
id="productName"
type="text"
placeholder="Contoh : Betmen">

</div>

<div class="form-group">

<label for="productCode">
Kode Produk
</label>

<input
id="productCode"
type="text"
placeholder="Contoh : BET001">

</div>

<div class="form-group">

<label for="productCategory">
Kategori
</label>

<select id="productCategory">

<option value="">
Pilih Kategori
</option>

</select>

</div>

<div class="form-group">

<label for="productFolder">
Folder Produk
</label>

<input
id="productFolder"
type="text"
placeholder="Contoh : Betmen 7cm">

</div>

<div class="form-group">

<label>
Thumbnail
</label>

<div

id="thumbnailUpload"
class="upload-box">

<img
id="thumbnailPreview"
hidden>

<span id="thumbnailText">

Klik untuk memilih thumbnail

</span>

</div>

<input
id="thumbnailFile"
type="file"
accept="image/*"
hidden>

<hr>

<div class="form-group">

<div class="section-title">

<h3>Daftar Warna</h3>

<button
type="button"
id="addColor">

+ Tambah Warna

</button>

</div>

<div id="colorList">

<p class="empty-text">

Belum ada warna.

</p>

</div>

</div>

<hr>

<button
id="saveProduct"
class="save-btn">

Simpan Produk

</button>

</div>

</body>
</html>
